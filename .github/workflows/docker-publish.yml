# Build BookOne web image in CI and push to GitHub Container Registry.
# Portainer pulls ghcr.io/<owner>/bookone-web:latest — no on-VPS docker build.
name: Docker Publish

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'ai/**'
      - '.github/copilot-instructions.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Must be lowercase for GHCR
  IMAGE_NAME: bookone-web

jobs:
  build-and-push:
    name: Build & push web image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase owner)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "Will push: ${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Monorepo Next builds need RAM; avoid OOM kills on default runners when possible
          provenance: false

      - name: Summary
        run: |
          {
            echo "## BookOne web image published"
            echo ""
            echo "| Tag | Value |"
            echo "|-----|-------|"
            echo "| Image | \`${{ env.IMAGE }}\` |"
            echo "| latest | \`${{ env.IMAGE }}:latest\` |"
            echo "| sha | \`${{ env.IMAGE }}:sha-$(echo ${{ github.sha }} | cut -c1-7)\` |"
            echo ""
            echo "Portainer should **pull** this image (no rebuild on VPS)."
            echo "If the package is private, add a GHCR read credential in Portainer Registries."
          } >> "$GITHUB_STEP_SUMMARY"

      # Optional: set repo secret PORTAINER_WEBHOOK_URL to auto-redeploy after publish
      - name: Trigger Portainer webhook
        continue-on-error: true
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "No PORTAINER_WEBHOOK_URL secret — skip auto-redeploy."
            exit 0
          fi
          curl -fsS -X POST "$PORTAINER_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{}' \
            && echo "Portainer webhook triggered." \
            || echo "Portainer webhook failed (non-fatal)."
