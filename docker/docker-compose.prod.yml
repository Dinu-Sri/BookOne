# BookOne — Production stack (ERP + docs; no public E2E)
# Compose path: docker/docker-compose.prod.yml
#
# Staging (3 services including e2e): use docker/docker-compose.staging.yml
#
# Hosts via Portainer env (examples):
#   WEB_HOST=app.bookone.lk          (or bookone.clossyan.com until cutover)
#   DOCS_HOST=docs.bookone.lk   (OK when bookone.lk is the zone root)
# Staging under clossyan.com must use bookone-docs.clossyan.com (not docs.bookone.clossyan.com)
#   AUTH_URL=https://app.bookone.lk

services:
  traefik:
    image: traefik:v3
    container_name: bookone-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt_data:/letsencrypt"
    networks:
      - bookone_network

  # Slim ERP image — no Chromium
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        BUILD_DATE: "${BUILD_DATE:-0}"
    container_name: bookone-web
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_URL=${REDIS_URL}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - AUTH_URL=${AUTH_URL:-https://bookone.clossyan.com}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-https://bookone.clossyan.com}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY:-}
      - CRON_SECRET=${CRON_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookone.rule=Host(`${WEB_HOST:-bookone.clossyan.com}`)"
      - "traefik.http.routers.bookone.entrypoints=web"
      - "traefik.http.services.bookone.loadbalancer.server.port=3100"
    networks:
      - bookone_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  docs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.docs
      args:
        DOCS_APP_URL: "${DOCS_APP_URL:-https://bookone.clossyan.com}"
    container_name: bookone-docs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookone-docs.rule=Host(`${DOCS_HOST:-bookone-docs.clossyan.com}`)"
      - "traefik.http.routers.bookone-docs.entrypoints=web"
      - "traefik.http.services.bookone-docs.loadbalancer.server.port=80"
    networks:
      - bookone_network
    restart: unless-stopped

  # E2E is staging-only (see docker-compose.staging.yml). Not deployed on production.

  postgres:
    image: postgres:16-alpine
    container_name: bookone-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookone_network

  redis:
    image: redis:7-alpine
    container_name: bookone-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookone_network

  minio:
    image: minio/minio:latest
    container_name: bookone-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - bookone_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bookone-cloudflared
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - bookone_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  letsencrypt_data:

networks:
  bookone_network:
    driver: bridge
