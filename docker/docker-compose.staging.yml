# BookOne — Staging stack (one Portainer stack, three app services)
# Compose path in Portainer: docker/docker-compose.staging.yml
# Repo: same monorepo; each service builds only what it needs.
#
# Default hosts (override in Portainer env):
#   WEB_HOST=bookone.clossyan.com
#   DOCS_HOST=docs.bookone.clossyan.com
#   E2E_HOST=e2e.bookone.clossyan.com

services:
  traefik:
    image: traefik:v3
    container_name: bookone-staging-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt_data:/letsencrypt"
    networks:
      - bookone_network

  # ── ERP (slim — no Chromium) ───────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        BUILD_DATE: "${BUILD_DATE:-0}"
    container_name: bookone-staging-web
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_URL=${REDIS_URL}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - AUTH_URL=${AUTH_URL:-https://bookone.clossyan.com}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-https://bookone.clossyan.com}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY:-}
      - CRON_SECRET=${CRON_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookone-web.rule=Host(`${WEB_HOST:-bookone.clossyan.com}`)"
      - "traefik.http.routers.bookone-web.entrypoints=web"
      - "traefik.http.services.bookone-web.loadbalancer.server.port=3100"
    networks:
      - bookone_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Docs (static) ──────────────────────────────────────────────────────
  docs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.docs
      args:
        DOCS_APP_URL: "${DOCS_APP_URL:-https://bookone.clossyan.com}"
    container_name: bookone-staging-docs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookone-docs.rule=Host(`${DOCS_HOST:-docs.bookone.clossyan.com}`)"
      - "traefik.http.routers.bookone-docs.entrypoints=web"
      - "traefik.http.services.bookone-docs.loadbalancer.server.port=80"
    networks:
      - bookone_network
    restart: unless-stopped

  # ── E2E runner (Playwright; rebuild only when e2e code changes) ────────
  e2e:
    build:
      context: ..
      dockerfile: docker/Dockerfile.e2e
    container_name: bookone-staging-e2e
    environment:
      - E2E_BASE_URL=${E2E_BASE_URL:-https://bookone.clossyan.com}
      - E2E_RUNNER_PORT=3200
      - E2E_ADMIN_EMAIL=${E2E_ADMIN_EMAIL:-}
      - E2E_ADMIN_PASSWORD=${E2E_ADMIN_PASSWORD:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookone-e2e.rule=Host(`${E2E_HOST:-e2e.bookone.clossyan.com}`)"
      - "traefik.http.routers.bookone-e2e.entrypoints=web"
      - "traefik.http.services.bookone-e2e.loadbalancer.server.port=3200"
    networks:
      - bookone_network
    depends_on:
      - web
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: bookone-staging-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookone_network

  redis:
    image: redis:7-alpine
    container_name: bookone-staging-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookone_network

  minio:
    image: minio/minio:latest
    container_name: bookone-staging-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - bookone_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bookone-staging-cloudflared
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - bookone_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  letsencrypt_data:

networks:
  bookone_network:
    driver: bridge
