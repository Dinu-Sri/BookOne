server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  location = /healthz {
    default_type text/plain;
    return 200 'ok\n';
  }

  gzip on;
  gzip_types text/css application/javascript text/html;
}
