# Reverse-proxy to ERP web → real Fumadocs UI (same as https://bookone…/docs)

upstream bookone_web {
  server web:3100;
  keepalive 16;
}

server {
  listen 80;
  server_name _;

  # Docs site home → Fumadocs
  location = / {
    return 302 /docs;
  }

  # Full Fumadocs app (pages, CSS, layout) — identical to main app /docs
  location /docs {
    proxy_pass http://bookone_web;
    proxy_http_version 1.1;
    # Use internal web hostname so Next generates stable asset URLs
    proxy_set_header Host web;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
  }

  location /api/search {
    proxy_pass http://bookone_web;
    proxy_http_version 1.1;
    proxy_set_header Host web;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /_next/ {
    proxy_pass http://bookone_web;
    proxy_http_version 1.1;
    proxy_set_header Host web;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /favicon {
    proxy_pass http://bookone_web;
    proxy_set_header Host web;
  }

  location /logo {
    proxy_pass http://bookone_web;
    proxy_set_header Host web;
  }

  location = /healthz {
    default_type text/plain;
    return 200 'ok docs-proxy-to-web-fumadocs\n';
  }
}
